<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pokeapi</title>
</head>
<body>

    <div id="info">
        <p id="nombre"></p>
        <p id="altura"></p>
        <p id="peso"></p>
        <p id="tipo1"></p>
        <p id="tipo2"></p>
    </div>

    <script>

        async function obtenerPokemon() {
            const url = 'https://pokeapi.co/api/v2/pokemon/1/';
            const response = await fetch(url);
            const data = await response.json();


            document.getElementById("nombre").textContent = "Nombre: " + data.name;
            document.getElementById("altura").textContent = "Altura: " + data.height;
            document.getElementById("peso").textContent = "Peso: " + data.weight;
            document.getElementById("tipo1").textContent = "Tipo1: " + data.types[0].type.name;
            document.getElementById("tipo2").textContent = "Tipo2: " + data.types[1].type.name;
        }
        obtenerPokemon();


    </script>
    
</body>
</html>
